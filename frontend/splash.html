<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFOtv</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        .splash-logo {
            width: 280px;
            height: auto;
        }

        .splash-bar-track {
            width: 180px;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        .splash-bar-fill {
            width: 0%;
            height: 100%;
            background: #fff;
            border-radius: 2px;
            animation: loading 2.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes loading {
            0% { width: 0%; }
            30% { width: 40%; }
            60% { width: 70%; }
            90% { width: 90%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <img src="FIFOtv.svg" alt="FIFOtv" class="splash-logo">
        <div class="splash-bar-track">
            <div class="splash-bar-fill" id="splash-bar"></div>
        </div>
    </div>

    <script>
        const sfx = new Audio('assets/sounds/splash.mp3');
        sfx.volume = 0.3;
        sfx.play().catch(() => {});

        const BACKEND_URL = 'http://localhost:5000';
        let attempts = 0;
        const maxAttempts = 30;

        async function checkBackend() {
            try {
                const res = await fetch(BACKEND_URL + '/api/streamings', { method: 'HEAD' });
                if (res.ok || res.status === 304) {
                    window.location.href = BACKEND_URL + '/app';
                    return;
                }
            } catch (e) {}

            attempts++;
            if (attempts < maxAttempts) {
                setTimeout(checkBackend, 1000);
            } else {
                // Backend didn't start, try direct file access
                window.location.href = 'index.html';
            }
        }

        // Start checking after initial animation
        setTimeout(checkBackend, 1500);
    </script>
</body>
</html>
