<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0816;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
    }
    .icon {
      width: 120px;
      height: 80px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      overflow: hidden;
    }
    .name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" id="icon"></div>
    <div class="name" id="name"></div>
    <div class="spinner"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || '';
    const icon = params.get('icon') || '';
    document.getElementById('name').textContent = name;
    if (icon) {
      document.getElementById('icon').innerHTML = `<img src="${icon}" style="max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;filter:brightness(0) invert(1);" onerror="this.style.display='none'">`;
    }
  </script>
</body>
</html>
