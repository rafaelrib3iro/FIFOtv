# ╔══════════════════════════════════════════════════════════╗
# ║  FIFOtv — Preseed (instalação desatendida Debian 13)    ║
# ║                                                          ║
# ║  COMO USAR:                                              ║
# ║                                                          ║
# ║  Opção 1 — via Parâmetro no GRUB do instalador:          ║
# ║    Na tela de boot do Debian, pressione Tab e adicione:  ║
# ║    auto url=file:///preseed.cfg                           ║
# ║                                                          ║
# ║  Opção 2 — via USB com preseed:                          ║
# ║    Copie este arquivo como "preseed.cfg" para a raiz     ║
# ║    de um USB separado e adicione no GRUB:                ║
# ║    auto url=hd:/dev/sdb1:/preseed.cfg                    ║
# ║                                                          ║
# ║  Opção 3 — Integrado na ISO (live-build):                ║
# ║    Coloque em config/includes.chroot/preseed.cfg         ║
# ╚══════════════════════════════════════════════════════════╝

# ─── IDIOMA E LOCALIZAÇÃO ──────────────────────────────
d-i debian-installer/locale string pt_BR.UTF-8
d-i keyboard-configuration/xkb-keymap select br

# ─── REDE ──────────────────────────────────────────────
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string fifotv
d-i netcfg/get_domain string local

# ─── MIRROR ────────────────────────────────────────────
d-i mirror/country string Brazil
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# ─── USUÁRIO ───────────────────────────────────────────
d-i passwd/root-login boolean false
d-i passwd/user-fullname string TV User
d-i passwd/username string tv
d-i passwd/user-password-crypted password $6$rounds=4096$placeholder$hash
# Nota: Use "password" como senha temporária (será alterada pelo configure.sh)
# Para gerar hash: mkpasswd -m sha-512 -R 4096

# ─── PARTICIONAMENTO ───────────────────────────────────
# Usa partição inteira, sem LVM, sem criptografia
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# ─── PACOTES ───────────────────────────────────────────
# Não instala desktop environment
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server
d-i pkgsel/upgrade select full-upgrade

# ─── BOOTLOADER ────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# ─── PÓS-INSTALAÇÃO ────────────────────────────────────
# Executa script após instalação
d-i preseed/late_command string \
    in-target chmod 755 /home/tv; \
    in-target mkdir -p /home/tv/smarttv; \
    in-target chown tv:tv /home/tv/smarttv

# ─── FINISH ────────────────────────────────────────────
d-i finish-install/reboot_in_progress note
